  # (each run currently re-downloads the ~16GB 1.3M brain dataset per module).
  # data_brain1m_10k:  modules/data/brain1m/profile
  # data_brain1m_100k: modules/data/brain1m/profile
  # data_brain1m_500k: modules/data/brain1m/profile
  # data_brain1m_1m:   modules/data/brain1m/profile

  # ---- convert stage ----
  scx_h5ad_to_h5seurat:         modules/convert/scx_h5ad_to_h5seurat/profile
  scx_h5seurat_to_h5ad:         modules/convert/scx_h5seurat_to_h5ad/profile
  anndatar_h5ad_to_rds_sce:     modules/convert/anndatar_h5ad_to_rds_sce/profile
  anndatar_rds_sce_to_h5ad:     modules/convert/anndatar_rds_sce_to_h5ad/profile
